<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>한국 규제·법령 변경 모니터 미리보기</title>
    <style>
      :root {
        --bg: #f5f6f2;
        --panel: #fff;
        --subtle: #f0f3ed;
        --text: #18201b;
        --muted: #657069;
        --line: #d9ded6;
        --accent: #12625b;
        --law: #214f82;
        --notice: #7a4a12;
        --guideline: #4d5c25;
        --news: #6a4d7c;
        --warn: #a33a2b;
        --shadow: 0 10px 28px rgba(28, 35, 31, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 56px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        padding: 8px 0 22px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 36px;
        line-height: 1.18;
      }

      .run-info {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 18px 0;
      }

      .stats div,
      .panel,
      .digest,
      .detail {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .stats div {
        display: grid;
        gap: 4px;
        padding: 16px;
      }

      .stats strong {
        color: var(--accent);
        font-size: 25px;
      }

      .stats span {
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 14px;
      }

      .datebar,
      .tabs,
      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .datebar button,
      .tabs button,
      .summary button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfa;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        padding: 8px 11px;
      }

      .datebar button.active,
      .tabs button.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .tabs button {
        display: inline-flex;
        gap: 8px;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(240px, 1.6fr) repeat(3, minmax(130px, 1fr));
        gap: 10px;
      }

      label,
      .summary div {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      label span,
      .summary span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfa;
        color: var(--text);
        padding: 8px 10px;
      }

      .summary div {
        flex: 1 1 280px;
      }

      .summary button {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .summary button:disabled {
        cursor: not-allowed;
        border-color: var(--line);
        background: #e6e9e3;
        color: var(--muted);
      }

      .digest {
        display: none;
        margin-top: 14px;
        padding: 16px;
        border-left: 5px solid var(--accent);
      }

      .digest p {
        margin-bottom: 0;
        line-height: 1.7;
      }

      .result-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 18px 0 10px;
        color: var(--muted);
      }

      .result-head strong {
        color: var(--text);
        font-size: 18px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        min-height: 142px;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 5px solid var(--accent);
        border-radius: 8px;
      }

      .item.law {
        border-left-color: var(--law);
      }

      .item.notice {
        border-left-color: var(--notice);
      }

      .item.guideline {
        border-left-color: var(--guideline);
      }

      .item.news {
        border-left-color: var(--news);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .meta span {
        min-height: 23px;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--subtle);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .meta .warn {
        background: #fdecea;
        color: var(--warn);
      }

      .item h2 {
        margin-bottom: 8px;
        font-size: 18px;
        line-height: 1.38;
      }

      .item h2 button {
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        text-align: left;
      }

      .item p {
        display: -webkit-box;
        margin-bottom: 12px;
        color: #3a453d;
        font-size: 14px;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      .foot {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: grid;
        gap: 8px;
        min-width: 82px;
      }

      .actions a,
      .actions button,
      .back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 8px 12px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: #fff;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .actions a {
        background: var(--accent);
        color: #fff;
      }

      .empty {
        padding: 34px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
      }

      .detail {
        padding: 24px;
      }

      .detail h1 {
        margin: 8px 0 20px;
        font-size: 34px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        margin-bottom: 22px;
        background: var(--line);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .grid div {
        padding: 12px;
        background: #fff;
      }

      .grid dt {
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .grid dd {
        margin: 0;
        word-break: break-word;
      }

      .raw {
        max-height: 420px;
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 800px) {
        .topbar,
        .result-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .run-info {
          text-align: left;
        }

        .stats,
        .filters,
        .grid {
          grid-template-columns: 1fr;
        }

        .item {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main id="home" class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local preview</p>
          <h1>한국 규제·법령 변경 모니터</h1>
        </div>
        <div class="run-info">
          <span>기준일 2026-05-26</span>
          <span>샘플 데이터 미리보기</span>
        </div>
      </header>

      <section class="stats">
        <div><strong id="total">0</strong><span>전체 항목</span></div>
        <div><strong id="official">0</strong><span>공식 법령/관보</span></div>
        <div><strong id="notices">0</strong><span>예고/공고</span></div>
        <div><strong id="verify">0</strong><span>검증 필요</span></div>
      </section>

      <section class="panel">
        <div id="datebar" class="datebar"></div>
        <div id="tabs" class="tabs"></div>
        <div class="filters">
          <label><span>검색</span><input id="q" placeholder="제목, 본문, 기관, 문서번호" /></label>
          <label><span>기관</span><select id="ministry"></select></label>
          <label><span>출처</span><select id="source"></select></label>
          <label><span>문서</span><select id="doc"></select></label>
        </div>
        <div class="summary">
          <div><span>OpenAI API key</span><input id="key" type="password" placeholder="sk-..." /></div>
          <button id="summarize" type="button">표시 항목 요약</button>
          <button id="clearKey" type="button">키 지우기</button>
        </div>
      </section>

      <section id="digest" class="digest"><strong>AI 요약</strong><p></p></section>
      <section class="result-head"><strong id="count">0건</strong><span>뉴스와 발언은 검증 필요로 표시됩니다.</span></section>
      <section id="list" class="list"></section>
    </main>

    <main id="detail" class="shell hidden"></main>

    <script>
      const labels = {
        source: {
          official_law: "법령",
          gazette: "관보",
          ministry_board: "부처 게시판",
          legislation_notice: "입법/행정예고",
          press: "보도자료",
          news: "뉴스"
        },
        document: {
          law: "법률",
          decree: "시행령",
          ordinance: "시행규칙/조례",
          notice: "고시",
          directive: "훈령",
          established_rule: "예규",
          guideline: "지침",
          announcement: "공고",
          news: "뉴스"
        },
        category: {
          all: "전체",
          law: "법령",
          notice: "고시/공고",
          guideline: "지침/규칙",
          news: "뉴스/발언"
        }
      };

      const items = [
        {
          id: "law-1",
          category: "law",
          source_type: "official_law",
          ministry: "행정안전부",
          document_type: "law",
          title: "전자정부법 일부개정법률 시행",
          issue_number: "법률 제00001호",
          publish_date: "2026-05-26",
          effective_date: "2026-08-01",
          change_type: "일부개정",
          confidence: "공식",
          original_url: "https://www.law.go.kr",
          summary: "전자정부서비스 고지와 송달 절차를 정비하고 공동이용 범위를 명확히 하는 예시입니다.",
          raw_text: "전자정부서비스 제공 절차와 민원 처리 통지 방식에 관한 조항을 정비한다.",
          verification_required: false
        },
        {
          id: "notice-1",
          category: "notice",
          source_type: "legislation_notice",
          ministry: "고용노동부",
          document_type: "notice",
          title: "근로시간 기록 관리지침 일부개정안 행정예고",
          issue_number: "고용노동부공고 제2026-101호",
          publish_date: "2026-05-26",
          effective_date: null,
          change_type: "예고/공고",
          confidence: "공식 예고",
          original_url: "https://opinion.lawmaking.go.kr",
          summary: "근로시간 전자기록 인정 요건과 제출자료 범위를 손보는 행정예고 예시입니다.",
          raw_text: "근로시간 기록 보관 기간, 전자기록 인정 요건, 사업장 점검 시 제출자료 범위를 정비한다.",
          verification_required: false
        },
        {
          id: "guideline-1",
          category: "guideline",
          source_type: "ministry_board",
          ministry: "기획재정부",
          document_type: "guideline",
          title: "국고보조금 집행관리 지침 개정",
          issue_number: "기획재정부지침 제2026-12호",
          publish_date: "2026-05-25",
          effective_date: "2026-06-01",
          change_type: "일부개정",
          confidence: "공식 예고",
          original_url: "https://www.moef.go.kr",
          summary: "보조금 집행 증빙과 사후점검 기준을 정비하는 지침 예시입니다.",
          raw_text: "국고보조금 집행관리 지침 중 증빙자료 제출 방식과 사후점검 기준을 개정한다.",
          verification_required: false
        },
        {
          id: "news-1",
          category: "news",
          source_type: "press",
          ministry: "법제처",
          document_type: "news",
          title: "정비 대상 법령 발굴 계획 발표",
          issue_number: null,
          publish_date: "2026-05-26",
          effective_date: null,
          change_type: "미분류",
          confidence: "보도/정책자료",
          original_url: "https://www.korea.kr",
          summary: "정책 방향을 보여주는 보도자료 예시이며 공식 변경 건수에는 포함하지 않습니다.",
          raw_text: "법령 정비 과제 발굴 계획을 발표했다는 정책브리핑 예시입니다.",
          verification_required: true
        }
      ];

      let selectedDate = "";
      let selectedCategory = "all";
      const itemDate = (item) => item.collection_date || item.publish_date || "";
      const dates = [...new Set(items.map(itemDate).filter(Boolean))].sort().reverse();

      const controls = {
        q: document.getElementById("q"),
        ministry: document.getElementById("ministry"),
        source: document.getElementById("source"),
        doc: document.getElementById("doc"),
        key: document.getElementById("key")
      };

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function fillSelect(select, values, names) {
        select.innerHTML =
          '<option value="">전체</option>' +
          values.map((value) => `<option value="${esc(value)}">${esc(names ? names[value] : value)}</option>`).join("");
      }

      function filterItems() {
        const q = controls.q.value.trim().toLowerCase();
        return items.filter((item) => {
          if (selectedCategory !== "all" && item.category !== selectedCategory) return false;
          if (selectedDate && itemDate(item) !== selectedDate) return false;
          if (controls.ministry.value && item.ministry !== controls.ministry.value) return false;
          if (controls.source.value && item.source_type !== controls.source.value) return false;
          if (controls.doc.value && item.document_type !== controls.doc.value) return false;
          if (!q) return true;
          return [item.title, item.summary, item.raw_text, item.ministry, item.issue_number].filter(Boolean).join(" ").toLowerCase().includes(q);
        });
      }

      function renderStats() {
        document.getElementById("total").textContent = items.length.toLocaleString("ko-KR");
        document.getElementById("official").textContent = items.filter((item) => item.confidence === "공식").length.toLocaleString("ko-KR");
        document.getElementById("notices").textContent = items.filter((item) => item.category === "notice").length.toLocaleString("ko-KR");
        document.getElementById("verify").textContent = items.filter((item) => item.verification_required).length.toLocaleString("ko-KR");
      }

      function renderDatebar() {
        document.getElementById("datebar").innerHTML =
          `<button class="${selectedDate ? "" : "active"}" data-date="">전체 날짜</button>` +
          dates.map((date) => `<button class="${selectedDate === date ? "active" : ""}" data-date="${esc(date)}">${esc(date)}</button>`).join("") +
          `<input type="date" value="${esc(selectedDate)}" aria-label="날짜 직접 입력" />`;
        document.querySelectorAll("[data-date]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedDate = button.getAttribute("data-date") || "";
            render();
          });
        });
        document.querySelector("#datebar input").addEventListener("change", (event) => {
          selectedDate = event.target.value;
          render();
        });
      }

      function renderTabs() {
        const scoped = selectedDate ? items.filter((item) => itemDate(item) === selectedDate) : items;
        const counts = { all: scoped.length, law: 0, notice: 0, guideline: 0, news: 0 };
        scoped.forEach((item) => (counts[item.category] += 1));
        document.getElementById("tabs").innerHTML = Object.keys(labels.category)
          .map(
            (key) =>
              `<button class="${selectedCategory === key ? "active" : ""}" data-cat="${key}"><span>${labels.category[key]}</span><strong>${counts[key]}</strong></button>`
          )
          .join("");
        document.querySelectorAll("[data-cat]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedCategory = button.getAttribute("data-cat");
            render();
          });
        });
      }

      function meta(item) {
        return [
          labels.category[item.category],
          labels.source[item.source_type],
          labels.document[item.document_type],
          item.change_type,
          item.confidence,
          item.verification_required ? "검증 필요" : ""
        ]
          .filter(Boolean)
          .map((value) => `<span class="${value === "검증 필요" ? "warn" : ""}">${esc(value)}</span>`)
          .join("");
      }

      function renderList() {
        const filtered = filterItems();
        document.getElementById("count").textContent = `${filtered.length.toLocaleString("ko-KR")}건`;
        if (!filtered.length) {
          document.getElementById("list").innerHTML = '<div class="empty">현재 조건에 맞는 수집 결과가 없습니다.</div>';
          return;
        }
        document.getElementById("list").innerHTML = filtered
          .map(
            (item) => `
              <article class="item ${esc(item.category)}">
                <div>
                  <div class="meta">${meta(item)}</div>
                  <h2><button data-id="${esc(item.id)}">${esc(item.title)}</button></h2>
                  <p>${esc(item.summary)}</p>
                  <div class="foot"><span>${esc(item.ministry)}</span><span>${esc(item.issue_number || "문서번호 없음")}</span><span>기준 ${esc(itemDate(item))}</span><span>공표 ${esc(item.publish_date)}</span><span>시행 ${esc(item.effective_date || "-")}</span></div>
                </div>
                <div class="actions"><a href="${esc(item.original_url)}" target="_blank" rel="noreferrer">원문</a><button data-id="${esc(item.id)}">상세</button></div>
              </article>`
          )
          .join("");
        document.querySelectorAll("[data-id]").forEach((button) => button.addEventListener("click", () => showDetail(button.getAttribute("data-id"))));
      }

      function showDetail(id) {
        const item = items.find((entry) => entry.id === id);
        if (!item) return;
        document.getElementById("home").classList.add("hidden");
        const detail = document.getElementById("detail");
        detail.classList.remove("hidden");
        detail.innerHTML = `
          <button class="back" id="back">미리보기 목록으로</button>
          <article class="detail">
            <div class="meta">${meta(item)}</div>
            <h1>${esc(item.title)}</h1>
            <dl class="grid">
              <div><dt>기관</dt><dd>${esc(item.ministry)}</dd></div>
              <div><dt>문서번호</dt><dd>${esc(item.issue_number || "-")}</dd></div>
              <div><dt>수집 기준일</dt><dd>${esc(itemDate(item) || "-")}</dd></div>
              <div><dt>공표일</dt><dd>${esc(item.publish_date || "-")}</dd></div>
              <div><dt>시행일</dt><dd>${esc(item.effective_date || "-")}</dd></div>
              <div><dt>출처</dt><dd>${esc(labels.source[item.source_type])}</dd></div>
              <div><dt>원문</dt><dd><a href="${esc(item.original_url)}" target="_blank" rel="noreferrer">원문 열기</a></dd></div>
            </dl>
            <h2>요약</h2>
            <p>${esc(item.summary)}</p>
            <h2>원문 추출 텍스트</h2>
            <pre class="raw">${esc(item.raw_text)}</pre>
          </article>`;
        document.getElementById("back").addEventListener("click", () => {
          detail.classList.add("hidden");
          document.getElementById("home").classList.remove("hidden");
        });
      }

      async function summarize() {
        const key = controls.key.value.trim();
        const filtered = filterItems();
        if (!key || !filtered.length) return;
        const digest = document.getElementById("digest");
        digest.style.display = "block";
        digest.querySelector("p").textContent = "요약 중";
        const input = filtered.map((item, i) => `${i + 1}. ${item.title}\n분류: ${labels.category[item.category]}\n기관: ${item.ministry}\n내용: ${item.summary || item.raw_text}`).join("\n\n");
        try {
          const response = await fetch("https://api.openai.com/v1/responses", {
            method: "POST",
            headers: { authorization: `Bearer ${key}`, "content-type": "application/json" },
            body: JSON.stringify({
              model: "gpt-5",
              max_output_tokens: 500,
              instructions: "한국 규제·법령 변경 모니터의 편집자처럼 제공된 항목만 근거로 간결하게 요약하세요.",
              input
            })
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          digest.querySelector("p").textContent = (data.output_text || JSON.stringify(data.output || "")).replace(/\s+/g, " ").trim();
        } catch (error) {
          digest.querySelector("p").textContent = `요약 실패: ${error.message || error}`;
        }
      }

      function render() {
        renderDatebar();
        renderTabs();
        renderList();
      }

      fillSelect(controls.ministry, [...new Set(items.map((item) => item.ministry))].sort());
      fillSelect(controls.source, Object.keys(labels.source), labels.source);
      fillSelect(controls.doc, Object.keys(labels.document), labels.document);
      Object.values(controls).forEach((control) => {
        if (control.id !== "key") {
          control.addEventListener("input", renderList);
          control.addEventListener("change", renderList);
        }
      });
      controls.key.value = sessionStorage.getItem("preview-openai-key") || "";
      controls.key.addEventListener("change", () => sessionStorage.setItem("preview-openai-key", controls.key.value));
      document.getElementById("summarize").addEventListener("click", summarize);
      document.getElementById("clearKey").addEventListener("click", () => {
        controls.key.value = "";
        sessionStorage.removeItem("preview-openai-key");
      });
      renderStats();
      render();
    </script>
  </body>
</html>
