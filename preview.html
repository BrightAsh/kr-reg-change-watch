<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reg Watch Preview</title>
    <style>
      :root {
        --bg: #edf1f6;
        --surface: #fff;
        --soft: #f3f6fa;
        --blue-soft: #f1f7ff;
        --ink: #101217;
        --ink-soft: #313845;
        --muted: #758091;
        --line: #d8e0eb;
        --line-strong: #c7d2df;
        --accent: #0a84ff;
        --accent-dark: #0064d2;
        --green: #21a366;
        --orange: #f59b14;
        --purple: #8d5cf6;
        --red: #e5484d;
        --shadow: 0 18px 48px rgba(33, 43, 58, 0.12);
        --shadow-soft: 0 10px 28px rgba(33, 43, 58, 0.08);
      }

      * { box-sizing: border-box; }
      html {
        min-height: 100%;
        background: linear-gradient(180deg, #fbfcff 0, var(--bg) 360px);
        color: var(--ink);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      body { margin: 0; }
      button, input { font: inherit; }
      button { cursor: pointer; }
      a { color: inherit; }
      h1, h2, p { margin-top: 0; }

      .app-shell {
        width: min(1440px, calc(100% - 36px));
        margin: 0 auto;
        padding: 20px 0 64px;
      }
      .app-header {
        display: flex;
        align-items: center;
        min-height: 58px;
        margin-bottom: 14px;
      }
      .brand-lockup {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .app-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background: linear-gradient(180deg, #20242b, #090b10);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 10px 22px rgba(16, 18, 23, 0.18);
      }
      .brand-lockup p {
        margin-bottom: 2px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .brand-lockup strong {
        display: block;
        font-size: 18px;
      }
      .overview-band {
        margin-bottom: 18px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(10, 132, 255, 0.1), rgba(255,255,255,0) 42%), var(--surface);
        box-shadow: var(--shadow-soft);
      }
      .eyebrow {
        margin-bottom: 7px;
        color: var(--accent-dark);
        font-size: 12px;
        font-weight: 800;
      }
      .overview-band h1 {
        margin-bottom: 7px;
        font-size: clamp(24px, 2.4vw, 34px);
        line-height: 1.14;
      }
      .overview-band p:last-child {
        margin-bottom: 0;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.65;
      }
      .app-workspace {
        display: grid;
        grid-template-columns: minmax(610px, 0.86fr) minmax(520px, 1fr);
        gap: 18px;
        align-items: start;
      }
      .side-panel {
        position: sticky;
        top: 18px;
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(210px, 0.62fr);
        gap: 14px;
        padding: 14px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: rgba(247, 249, 252, 0.88);
        box-shadow: var(--shadow);
      }
      .calendar-card, .category-summary, .filter-toolbar, .results-header, .item-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow-soft);
      }
      .calendar-card {
        display: grid;
        gap: 12px;
        padding: 14px;
      }
      .calendar-toolbar {
        display: grid;
        grid-template-columns: 38px 1fr 38px;
        gap: 8px;
        align-items: center;
      }
      .calendar-toolbar button, .filter-trigger, .ai-button, .item-links a, .item-links button, .modal-actions button, .popover-actions button, .close-button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
      }
      .calendar-toolbar button {
        display: grid;
        place-items: center;
        height: 38px;
        color: var(--accent-dark);
      }
      .calendar-toolbar strong {
        justify-self: center;
        font-size: 17px;
      }
      .calendar-weekdays, .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }
      .calendar-weekdays {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }
      .calendar-weekdays span:first-child, .calendar-weekdays span:last-child { color: var(--red); }
      .calendar-grid { gap: 5px; }
      .calendar-empty, .calendar-day {
        aspect-ratio: 1;
        min-height: 39px;
      }
      .calendar-day {
        display: grid;
        place-items: center;
        gap: 1px;
        padding: 5px 2px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: #f7f9fc;
        color: var(--ink-soft);
      }
      .calendar-day span {
        font-size: 13px;
        font-weight: 800;
        line-height: 1;
      }
      .calendar-day small {
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
      }
      .calendar-day.holiday span, .calendar-day.holiday small { color: var(--red); }
      .calendar-day.has-data {
        border-color: rgba(10, 132, 255, 0.22);
        background: var(--blue-soft);
      }
      .calendar-day.selected {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
        box-shadow: 0 10px 22px rgba(10, 132, 255, 0.24);
      }
      .calendar-day.selected span, .calendar-day.selected small { color: #fff; }
      .category-summary {
        display: grid;
        gap: 8px;
        align-self: start;
        padding: 12px;
      }
      .category-summary button {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        min-height: 46px;
        padding: 10px 12px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--soft);
        color: var(--ink-soft);
        font-weight: 800;
        text-align: left;
      }
      .category-summary button.active {
        border-color: rgba(10, 132, 255, 0.26);
        background: #eaf4ff;
        color: var(--accent-dark);
      }
      .category-summary strong { font-size: 18px; }
      .content-stage {
        display: grid;
        gap: 12px;
        min-width: 0;
      }
      .filter-toolbar {
        position: relative;
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(4, minmax(72px, 92px)) minmax(210px, 1fr);
        gap: 9px;
        align-items: center;
        padding: 12px;
      }
      .filter-menu { position: relative; }
      .filter-trigger {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 7px;
        width: 100%;
        min-height: 42px;
        padding: 9px 8px;
        color: var(--ink-soft);
      }
      .filter-trigger.active {
        border-color: rgba(10, 132, 255, 0.25);
        background: #eaf4ff;
        color: var(--accent-dark);
      }
      .filter-trigger strong:not(:empty) {
        display: grid;
        place-items: center;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        font-size: 11px;
      }
      .filter-popover {
        position: absolute;
        top: calc(100% + 9px);
        left: 0;
        z-index: 20;
        width: 300px;
        overflow: hidden;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 22px 58px rgba(33,43,58,.2);
      }
      .popover-head, .popover-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px;
        background: #f7f9fc;
      }
      .popover-head button {
        border: 0;
        background: transparent;
        color: var(--accent-dark);
        font-size: 12px;
        font-weight: 800;
      }
      .filter-options {
        display: grid;
        max-height: 292px;
        overflow: auto;
        padding: 8px;
      }
      .filter-options label {
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 9px;
        align-items: center;
        min-height: 36px;
        padding: 7px 8px;
        border-radius: 8px;
        color: var(--ink-soft);
        font-size: 13px;
        font-weight: 700;
      }
      .filter-options label:hover { background: var(--soft); }
      .filter-options input {
        width: 16px;
        height: 16px;
        min-height: 0;
        accent-color: var(--accent);
      }
      .popover-actions {
        border-top: 1px solid var(--line);
      }
      .popover-actions button, .modal-actions button {
        min-height: 38px;
        padding: 8px 13px;
      }
      .popover-actions button:last-child, .modal-actions button:first-child, .ai-button {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
      .search-field {
        display: grid;
        gap: 7px;
        min-width: 0;
      }
      .search-field span, .modal label span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
        color: var(--ink);
        padding: 9px 11px;
      }
      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        color: var(--muted);
      }
      .results-header div {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: baseline;
      }
      .results-header strong {
        color: var(--ink);
        font-size: 20px;
      }
      .ai-button {
        min-height: 38px;
        padding: 9px 14px;
      }
      .item-list {
        display: grid;
        gap: 10px;
      }
      .item-card {
        display: grid;
        grid-template-columns: 7px minmax(0, 1fr) auto;
        gap: 14px;
        min-height: 136px;
        padding: 14px;
      }
      .category-rail {
        width: 7px;
        border-radius: 8px;
        background: var(--accent);
      }
      .category-notice .category-rail { background: var(--orange); }
      .category-guideline .category-rail { background: var(--green); }
      .category-news .category-rail { background: var(--purple); }
      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 9px;
      }
      .item-meta span {
        min-height: 24px;
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--ink-soft);
        font-size: 12px;
        font-weight: 800;
      }
      .item-meta .warn {
        background: #fff0f0;
        color: var(--red);
      }
      .item-card h2 {
        margin-bottom: 8px;
        font-size: 18px;
        line-height: 1.42;
      }
      .item-card h2 button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-weight: 800;
        text-align: left;
      }
      .item-card p {
        display: -webkit-box;
        margin-bottom: 10px;
        color: var(--ink-soft);
        font-size: 14px;
        line-height: 1.58;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }
      .item-foot {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        color: var(--muted);
        font-size: 12px;
      }
      .item-links {
        display: grid;
        align-content: center;
        gap: 8px;
        width: 82px;
      }
      .item-links a, .item-links button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 38px;
        padding: 9px 12px;
        font-size: 13px;
      }
      .item-links a {
        border-color: transparent;
        background: var(--ink);
        color: #fff;
      }
      .empty {
        padding: 42px 22px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(251,252,255,.68);
        color: var(--muted);
        text-align: center;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(17,19,24,.28);
        backdrop-filter: blur(12px);
      }
      .modal {
        display: grid;
        gap: 14px;
        width: min(520px, 100%);
        padding: 18px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 28px 76px rgba(16,18,23,.26);
      }
      .modal-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
      }
      .modal-head span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .modal-head strong {
        display: block;
        margin-top: 5px;
        font-size: 18px;
      }
      .close-button {
        width: 34px;
        height: 34px;
        font-size: 22px;
      }
      .modal label {
        display: grid;
        gap: 7px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .digest {
        display: none;
        padding: 14px;
        border: 1px solid var(--line);
        border-left: 5px solid var(--accent);
        border-radius: 8px;
        background: #f8fafc;
      }
      .digest p {
        margin-bottom: 0;
        color: var(--ink-soft);
        line-height: 1.75;
      }
      .hidden { display: none; }

      @media (max-width: 1220px) {
        .app-workspace { grid-template-columns: 1fr; }
        .side-panel { position: static; grid-template-columns: minmax(310px, 1fr) minmax(210px, 0.62fr); }
      }
      @media (max-width: 760px) {
        .app-shell { width: min(100% - 20px, 1440px); }
        .side-panel { grid-template-columns: 1fr; }
        .filter-toolbar { grid-template-columns: repeat(4, minmax(70px, 88px)) minmax(190px, 1fr); overflow-x: auto; }
        .search-field { min-width: 190px; }
        .results-header { align-items: stretch; flex-direction: column; }
        .item-card { grid-template-columns: 6px minmax(0, 1fr); }
        .item-links { grid-column: 2; grid-template-columns: repeat(2, 1fr); width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <span class="app-mark">R</span>
          <div>
            <p>Preview</p>
            <strong>샘플 데이터 미리보기</strong>
          </div>
        </div>
      </header>

      <section class="overview-band">
        <p class="eyebrow">Local app preview</p>
        <h1>Reg Watch Preview</h1>
        <p>샘플 데이터로 날짜 선택, 필터, 상세 화면의 흐름을 설치 없이 확인합니다.</p>
      </section>

      <section class="app-workspace">
        <aside class="side-panel">
          <section class="calendar-card">
            <div class="calendar-toolbar">
              <button id="prevMonth" type="button">&lt;</button>
              <strong id="monthLabel"></strong>
              <button id="nextMonth" type="button">&gt;</button>
            </div>
            <div class="calendar-weekdays">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div id="calendar" class="calendar-grid"></div>
          </section>
          <nav id="categories" class="category-summary"></nav>
        </aside>

        <div class="content-stage">
          <section id="filterToolbar" class="filter-toolbar"></section>
          <section class="results-header">
            <div><strong id="count">0건</strong><span id="state">표시 중</span><small id="filterCount"></small></div>
            <button id="openAi" class="ai-button" type="button">AI 브리핑</button>
          </section>
          <section id="list" class="item-list"></section>
        </div>
      </section>
    </main>

    <div id="aiModal" class="modal-backdrop hidden">
      <section class="modal">
        <div class="modal-head">
          <div><span>AI 브리핑</span><strong>현재 화면의 항목을 요약합니다.</strong></div>
          <button id="closeAi" class="close-button" type="button">×</button>
        </div>
        <label><span>OpenAI API 키</span><input id="apiKey" type="password" placeholder="sk-..." /></label>
        <div class="modal-actions">
          <button id="summarize" type="button">브리핑 생성</button>
          <button id="clearKey" type="button">키 삭제</button>
        </div>
        <div id="digest" class="digest"><strong>AI 브리핑</strong><p></p></div>
      </section>
    </div>

    <script>
      const labels = {
        source: { official_law: "법령", gazette: "관보", ministry_board: "부처 게시판", legislation_notice: "입법/행정예고", press: "보도자료", news: "뉴스" },
        document: { law: "법률", decree: "시행령", ordinance: "시행규칙/조례", notice: "고시", directive: "훈령", established_rule: "예규", guideline: "지침", announcement: "공고", news: "뉴스" },
        change: { partial_revision: "일부개정", notice: "예고/공고", unknown: "미분류" },
        category: { all: "전체", law: "법령", notice: "고시/공고", guideline: "지침/규칙", news: "뉴스/발언" }
      };

      const items = [
        { id: "law-1", category: "law", source_type: "official_law", ministry: "행정안전부", document_type: "law", title: "전자정부법 일부개정법률 시행", issue_number: "법률 제00001호", collection_date: "2026-05-26", publish_date: "2026-05-26", effective_date: "2026-08-01", change_type: "partial_revision", confidence: "공식", original_url: "https://www.law.go.kr", summary: "전자정부서비스 고지와 송달 절차를 정비하고 공동이용 범위를 명확히 하는 예시입니다.", raw_text: "전자정부서비스 제공 절차와 민원 처리 통지 방식에 관한 조항을 정비한다.", verification_required: false },
        { id: "notice-1", category: "notice", source_type: "legislation_notice", ministry: "고용노동부", document_type: "notice", title: "근로시간 기록 관리지침 일부개정안 행정예고", issue_number: "고용노동부공고 제2026-101호", collection_date: "2026-05-26", publish_date: "2026-05-26", effective_date: null, change_type: "notice", confidence: "공식 예고", original_url: "https://opinion.lawmaking.go.kr", summary: "근로시간 전자기록 인정 요건과 제출자료 범위를 손보는 행정예고 예시입니다.", raw_text: "근로시간 기록 보관 기간, 전자기록 인정 요건, 사업장 점검 시 제출자료 범위를 정비한다.", verification_required: false },
        { id: "guideline-1", category: "guideline", source_type: "ministry_board", ministry: "기획재정부", document_type: "guideline", title: "국고보조금 집행관리 지침 개정", issue_number: "기획재정부지침 제2026-12호", collection_date: "2026-05-25", publish_date: "2026-05-25", effective_date: "2026-06-01", change_type: "partial_revision", confidence: "공식 예고", original_url: "https://www.moef.go.kr", summary: "보조금 집행 증빙과 사후점검 기준을 정비하는 지침 예시입니다.", raw_text: "국고보조금 집행관리 지침 중 증빙자료 제출 방식과 사후점검 기준을 개정한다.", verification_required: false },
        { id: "news-1", category: "news", source_type: "press", ministry: "법제처", document_type: "news", title: "정비 대상 법령 발굴 계획 발표", issue_number: null, collection_date: "2026-05-26", publish_date: "2026-05-26", effective_date: null, change_type: "unknown", confidence: "보도/정책자료", original_url: "https://www.korea.kr", summary: "정책 방향을 보여주는 보도자료 예시이며 공식 변경 건수에는 포함하지 않습니다.", raw_text: "법령 정비 과제 발굴 계획을 발표했다는 정책브리핑 예시입니다.", verification_required: true }
      ];

      const fixedHolidays = new Set(["01-01", "03-01", "05-05", "06-06", "08-15", "10-03", "10-09", "12-25"]);
      const holidayOverrides = new Set(["2026-05-24", "2026-05-25"]);
      const dates = [...new Set(items.map((item) => item.collection_date || item.publish_date))].sort().reverse();
      const filters = { ministry: [], source: [], document: [], change: [] };
      let selectedDate = dates[0];
      let monthCursor = selectedDate.slice(0, 7);
      let category = "all";
      let activeFilter = null;
      let draft = [];
      let query = "";

      const esc = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      const pad = (value) => String(value).padStart(2, "0");
      const dateOf = (item) => item.collection_date || item.publish_date || "";
      const monthLabel = (value) => `${value.slice(0, 4)}년 ${Number(value.slice(5))}월`;
      const countsByDate = () => items.reduce((map, item) => ((map[dateOf(item)] = (map[dateOf(item)] || 0) + 1), map), {});
      const hasHoliday = (date) => fixedHolidays.has(date.slice(5)) || holidayOverrides.has(date);

      function calendarCells() {
        const [year, month] = monthCursor.split("-").map(Number);
        const first = new Date(year, month - 1, 1).getDay();
        const days = new Date(year, month, 0).getDate();
        const cells = Array.from({ length: first }, () => null);
        for (let day = 1; day <= days; day += 1) cells.push(`${year}-${pad(month)}-${pad(day)}`);
        while (cells.length < 42) cells.push(null);
        return cells;
      }

      function scopedItems() {
        return items.filter((item) => dateOf(item) === selectedDate);
      }

      function filteredItems() {
        const text = query.trim().toLowerCase();
        return scopedItems().filter((item) => {
          if (category !== "all" && item.category !== category) return false;
          if (filters.ministry.length && !filters.ministry.includes(item.ministry)) return false;
          if (filters.source.length && !filters.source.includes(item.source_type)) return false;
          if (filters.document.length && !filters.document.includes(item.document_type)) return false;
          if (filters.change.length && !filters.change.includes(item.change_type)) return false;
          if (!text) return true;
          return [item.title, item.summary, item.raw_text, item.ministry, item.issue_number].filter(Boolean).join(" ").toLowerCase().includes(text);
        });
      }

      function renderCalendar() {
        const counts = countsByDate();
        document.getElementById("monthLabel").textContent = monthLabel(monthCursor);
        document.getElementById("calendar").innerHTML = calendarCells().map((date, index) => {
          if (!date) return '<div class="calendar-empty"></div>';
          const day = Number(date.slice(8));
          const count = counts[date] || 0;
          const cls = ["calendar-day", date === selectedDate ? "selected" : "", count ? "has-data" : "", index % 7 === 0 || index % 7 === 6 || hasHoliday(date) ? "holiday" : ""].filter(Boolean).join(" ");
          return `<button class="${cls}" type="button" data-date="${date}"><span>${day}</span><small>${count.toLocaleString("ko-KR")}</small></button>`;
        }).join("");
        document.querySelectorAll("[data-date]").forEach((button) => button.addEventListener("click", () => {
          selectedDate = button.getAttribute("data-date");
          monthCursor = selectedDate.slice(0, 7);
          render();
        }));
      }

      function renderCategories() {
        const counts = { all: scopedItems().length, law: 0, notice: 0, guideline: 0, news: 0 };
        scopedItems().forEach((item) => counts[item.category] += 1);
        document.getElementById("categories").innerHTML = Object.keys(labels.category).map((key) =>
          `<button class="${category === key ? "active" : ""}" type="button" data-cat="${key}"><span>${labels.category[key]}</span><strong>${counts[key].toLocaleString("ko-KR")}</strong></button>`
        ).join("");
        document.querySelectorAll("[data-cat]").forEach((button) => button.addEventListener("click", () => {
          category = button.getAttribute("data-cat");
          render();
        }));
      }

      function filterOptions(key) {
        if (key === "ministry") return [...new Set(items.map((item) => item.ministry))].sort().map((value) => ({ value, label: value }));
        if (key === "source") return Object.keys(labels.source).map((value) => ({ value, label: labels.source[value] }));
        if (key === "document") return Object.keys(labels.document).map((value) => ({ value, label: labels.document[value] }));
        return Object.keys(labels.change).map((value) => ({ value, label: labels.change[value] }));
      }

      function renderToolbar() {
        const configs = [
          ["ministry", "기관"],
          ["source", "출처"],
          ["document", "문서"],
          ["change", "변경"]
        ];
        document.getElementById("filterToolbar").innerHTML = configs.map(([key, label]) => `
          <div class="filter-menu">
            <button class="filter-trigger ${filters[key].length ? "active" : ""}" type="button" data-filter="${key}"><span>${label}</span><strong>${filters[key].length || ""}</strong></button>
            ${activeFilter === key ? renderPopover(key, label) : ""}
          </div>`).join("") + `
          <label class="search-field"><span>검색</span><input id="searchInput" value="${esc(query)}" placeholder="제목, 본문, 기관, 문서번호 검색" /></label>`;
        document.querySelectorAll("[data-filter]").forEach((button) => button.addEventListener("click", () => {
          const key = button.getAttribute("data-filter");
          activeFilter = activeFilter === key ? null : key;
          draft = [...filters[key]];
          renderToolbar();
        }));
        document.querySelectorAll("[data-check]").forEach((checkbox) => checkbox.addEventListener("change", () => {
          const value = checkbox.getAttribute("data-check");
          draft = checkbox.checked ? [...draft, value] : draft.filter((entry) => entry !== value);
          renderToolbar();
        }));
        document.querySelectorAll("[data-clear]").forEach((button) => button.addEventListener("click", () => {
          draft = [];
          renderToolbar();
        }));
        document.querySelectorAll("[data-cancel]").forEach((button) => button.addEventListener("click", () => {
          activeFilter = null;
          renderToolbar();
        }));
        document.querySelectorAll("[data-apply]").forEach((button) => button.addEventListener("click", () => {
          filters[button.getAttribute("data-apply")] = [...draft];
          activeFilter = null;
          render();
        }));
        document.getElementById("searchInput").addEventListener("input", (event) => {
          query = event.target.value;
          renderList();
        });
      }

      function renderPopover(key, label) {
        return `<div class="filter-popover">
          <div class="popover-head"><strong>${label}</strong><button type="button" data-clear="${key}">전체 해제</button></div>
          <div class="filter-options">${filterOptions(key).map((option) =>
            `<label><input type="checkbox" data-check="${esc(option.value)}" ${draft.includes(option.value) ? "checked" : ""} /><span>${esc(option.label)}</span></label>`
          ).join("")}</div>
          <div class="popover-actions"><button type="button" data-cancel="${key}">취소</button><button type="button" data-apply="${key}">확인</button></div>
        </div>`;
      }

      function renderList() {
        const list = filteredItems();
        const filterCount = Object.values(filters).reduce((sum, value) => sum + value.length, 0);
        document.getElementById("count").textContent = `${list.length.toLocaleString("ko-KR")}건`;
        document.getElementById("state").textContent = dates.includes(selectedDate) ? "표시 중" : "저장 자료 없음";
        document.getElementById("filterCount").textContent = filterCount ? `${filterCount.toLocaleString("ko-KR")}개 필터` : "";
        if (!list.length) {
          document.getElementById("list").innerHTML = '<div class="empty"><strong>표시할 항목이 없습니다.</strong><br />날짜, 검색어, 필터를 조정해보세요.</div>';
          return;
        }
        document.getElementById("list").innerHTML = list.map((item) => `
          <article class="item-card category-${item.category}">
            <div class="category-rail"></div>
            <div>
              <div class="item-meta"><span>${labels.category[item.category]}</span><span>${labels.document[item.document_type]}</span><span>${labels.change[item.change_type]}</span>${item.verification_required ? '<span class="warn">확인 필요</span>' : ""}</div>
              <h2><button type="button">${esc(item.title)}</button></h2>
              <p>${esc(item.summary)}</p>
              <div class="item-foot"><span>${esc(item.ministry)}</span><span>${esc(item.issue_number || "문서번호 없음")}</span><span>기준 ${dateOf(item)}</span><span>시행 ${esc(item.effective_date || "-")}</span></div>
            </div>
            <div class="item-links"><a href="${esc(item.original_url)}" target="_blank" rel="noreferrer">원문</a><button type="button">상세</button></div>
          </article>`).join("");
      }

      function render() {
        renderCalendar();
        renderCategories();
        renderToolbar();
        renderList();
      }

      document.getElementById("prevMonth").addEventListener("click", () => {
        const [year, month] = monthCursor.split("-").map(Number);
        const next = new Date(year, month - 2, 1);
        monthCursor = `${next.getFullYear()}-${pad(next.getMonth() + 1)}`;
        renderCalendar();
      });
      document.getElementById("nextMonth").addEventListener("click", () => {
        const [year, month] = monthCursor.split("-").map(Number);
        const next = new Date(year, month, 1);
        monthCursor = `${next.getFullYear()}-${pad(next.getMonth() + 1)}`;
        renderCalendar();
      });
      document.getElementById("openAi").addEventListener("click", () => document.getElementById("aiModal").classList.remove("hidden"));
      document.getElementById("closeAi").addEventListener("click", () => document.getElementById("aiModal").classList.add("hidden"));
      document.getElementById("apiKey").value = sessionStorage.getItem("preview-openai-key") || "";
      document.getElementById("apiKey").addEventListener("change", (event) => sessionStorage.setItem("preview-openai-key", event.target.value));
      document.getElementById("clearKey").addEventListener("click", () => {
        document.getElementById("apiKey").value = "";
        sessionStorage.removeItem("preview-openai-key");
      });
      document.getElementById("summarize").addEventListener("click", () => {
        const digest = document.getElementById("digest");
        digest.style.display = "block";
        digest.querySelector("p").textContent = filteredItems().map((item) => item.title).join(", ") || "표시 중인 항목이 없습니다.";
      });
      render();
    </script>
  </body>
</html>
