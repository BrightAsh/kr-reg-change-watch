<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>한국 법령 변경 모니터 미리보기</title>
    <style>
      :root {
        --bg: #f7f8f5;
        --panel: #ffffff;
        --panel-subtle: #eef3ee;
        --text: #17201b;
        --muted: #657068;
        --line: #d9dfd8;
        --accent: #12625b;
        --accent-2: #8c4b18;
        --accent-3: #2f5d92;
        --warn: #9f3a2e;
        --shadow: 0 8px 28px rgba(31, 41, 35, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
      }

      a {
        color: inherit;
      }

      .page-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        padding: 8px 0 24px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      .topbar h1 {
        margin-bottom: 0;
        font-size: 40px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .run-info {
        display: grid;
        gap: 6px;
        min-width: 240px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .stats-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        padding: 20px 0;
      }

      .stats-strip div,
      .filters,
      .logs-panel,
      .detail-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .stats-strip div {
        display: grid;
        gap: 4px;
        padding: 16px;
      }

      .stats-strip strong {
        color: var(--accent);
        font-size: 26px;
        line-height: 1;
      }

      .stats-strip span {
        color: var(--muted);
        font-size: 13px;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(220px, 1.5fr) repeat(5, minmax(120px, 1fr));
        gap: 12px;
        padding: 14px;
      }

      .filters label {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .filters span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfa;
        color: var(--text);
        font: inherit;
        padding: 8px 10px;
      }

      input:focus,
      select:focus {
        outline: 2px solid rgba(18, 98, 91, 0.24);
        border-color: var(--accent);
      }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 20px 0 10px;
        color: var(--muted);
      }

      .results-header strong {
        color: var(--text);
        font-size: 18px;
      }

      .item-list {
        display: grid;
        gap: 10px;
      }

      .item-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        min-height: 148px;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 5px solid var(--accent);
        border-radius: 8px;
      }

      .item-main {
        min-width: 0;
      }

      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .item-meta span {
        min-height: 24px;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--panel-subtle);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .item-meta .warn {
        background: #fdecea;
        color: var(--warn);
      }

      .item-card h2 {
        margin-bottom: 8px;
        font-size: 19px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .item-card button {
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-size: 19px;
        font-weight: 700;
        line-height: 1.35;
        text-align: left;
      }

      .item-card button:hover,
      .back-link:hover,
      .detail-section a:hover {
        text-decoration: underline;
      }

      .item-card p {
        display: -webkit-box;
        margin-bottom: 12px;
        color: #3a453d;
        font-size: 14px;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      .item-foot {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .item-actions {
        display: grid;
        gap: 8px;
        min-width: 82px;
      }

      .item-actions a,
      .item-actions button,
      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 8px 12px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
      }

      .item-actions a {
        background: var(--accent);
        color: #fff;
      }

      .item-actions button {
        background: #fff;
        cursor: pointer;
      }

      .empty-state {
        display: grid;
        gap: 8px;
        padding: 32px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
      }

      .empty-state strong {
        color: var(--text);
      }

      .logs-panel {
        margin-top: 24px;
        padding: 18px;
      }

      .logs-panel h2 {
        margin-bottom: 12px;
        font-size: 18px;
      }

      .logs-panel ul {
        display: grid;
        gap: 8px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .logs-panel li {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: start;
        padding: 10px 0;
        border-top: 1px solid var(--line);
      }

      .logs-panel li:first-child {
        border-top: 0;
      }

      .logs-panel p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        margin-top: 5px;
        border-radius: 999px;
        background: var(--accent-3);
      }

      .status-dot.error {
        background: var(--warn);
      }

      .status-dot.skipped {
        background: var(--accent-2);
      }

      .detail-shell {
        max-width: 960px;
      }

      .back-link {
        width: fit-content;
        margin-bottom: 16px;
        background: var(--panel);
        cursor: pointer;
      }

      .detail-panel {
        padding: 24px;
      }

      .detail-panel h1 {
        margin: 8px 0 20px;
        font-size: 36px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        margin: 0 0 22px;
        background: var(--line);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .detail-grid div {
        min-width: 0;
        padding: 12px;
        background: #fff;
      }

      .detail-grid dt {
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .detail-grid dd {
        margin: 0;
        word-break: break-word;
      }

      .detail-section {
        padding-top: 18px;
        margin-top: 18px;
        border-top: 1px solid var(--line);
      }

      .detail-section h2 {
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 17px;
      }

      .detail-section p {
        line-height: 1.7;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
      }

      .link-list {
        display: grid;
        gap: 8px;
        padding-left: 18px;
        word-break: break-all;
      }

      .raw-text {
        max-height: 520px;
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
        color: #2b352e;
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 920px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .run-info {
          text-align: left;
        }

        .stats-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .page-shell {
          width: min(100% - 20px, 1180px);
          padding-top: 18px;
        }

        .topbar h1 {
          font-size: 30px;
        }

        .detail-panel h1 {
          font-size: 28px;
        }

        .stats-strip,
        .filters,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .item-card {
          grid-template-columns: 1fr;
        }

        .item-actions {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .results-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main id="list-view" class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local preview</p>
          <h1>샘플 데이터 미리보기</h1>
        </div>
        <div class="run-info">
          <span id="target-date"></span>
          <span id="run-at"></span>
        </div>
      </header>

      <section class="stats-strip" aria-label="샘플 통계">
        <div>
          <strong id="stat-total">0</strong>
          <span>전체 항목</span>
        </div>
        <div>
          <strong id="stat-official">0</strong>
          <span>공식 법령/관보</span>
        </div>
        <div>
          <strong id="stat-notices">0</strong>
          <span>예고/공고</span>
        </div>
        <div>
          <strong id="stat-verify">0</strong>
          <span>검증 필요</span>
        </div>
      </section>

      <section class="filters" aria-label="필터와 검색">
        <label>
          <span>검색</span>
          <input id="query" placeholder="제목, 본문, 기관, 문서번호" />
        </label>
        <label>
          <span>기관</span>
          <select id="ministry"></select>
        </label>
        <label>
          <span>출처 유형</span>
          <select id="source-type"></select>
        </label>
        <label>
          <span>문서 유형</span>
          <select id="document-type"></select>
        </label>
        <label>
          <span>변경상태</span>
          <select id="change-type"></select>
        </label>
        <label>
          <span>날짜</span>
          <select id="date"></select>
        </label>
      </section>

      <section class="results-header">
        <strong id="result-count">0건</strong>
        <span>뉴스와 보도자료는 공식 변경으로 집계하지 않습니다.</span>
      </section>

      <section id="item-list" class="item-list" aria-label="변경 목록"></section>

      <section class="logs-panel" aria-label="수집 로그">
        <h2>최근 수집 로그</h2>
        <ul id="logs"></ul>
      </section>
    </main>

    <main id="detail-view" class="page-shell detail-shell hidden"></main>

      const run = {

        last_target_date: "2026-05-26",
        logs: [
          { source: "국가법령정보센터", status: "ok", message: "샘플 법령 변경 데이터를 불러왔습니다.", count: 1 },

      const sortedItems = [...items].sort((a, b) => {
        const dateCompare = String(b.publish_date || "").localeCompare(String(a.publish_date || ""));

      const controls = {

      };

      function unique(values) {
        return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function optionHtml(value, label) {
        return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
      }

      function fillSelect(select, values, labels) {
        select.innerHTML =
          optionHtml("", "전체") +
          values.map((value) => optionHtml(value, labels ? labels[value] : value)).join("");
      }

      function renderStats() {
        const stats = {
          total: sortedItems.length,
          official: sortedItems.filter((item) => item.confidence === "official").length,
          notices: sortedItems.filter((item) => item.source_type === "legislation_notice").length,
          verify: sortedItems.filter((item) => item.verification_required).length
        };

        document.getElementById("stat-total").textContent = stats.total.toLocaleString("ko-KR");
        document.getElementById("stat-official").textContent = stats.official.toLocaleString("ko-KR");
        document.getElementById("stat-notices").textContent = stats.notices.toLocaleString("ko-KR");
        document.getElementById("stat-verify").textContent = stats.verify.toLocaleString("ko-KR");
        document.getElementById("target-date").textContent = `기준일 ${run.last_target_date}`;
        document.getElementById("run-at").textContent = `최근 실행 ${new Date(run.last_run_at).toLocaleString("ko-KR")}`;
      }

      function filterItems() {
        const query = controls.query.value.trim().toLowerCase();
        return sortedItems.filter((item) => {
          if (controls.ministry.value && item.ministry !== controls.ministry.value) return false;
          if (controls.sourceType.value && item.source_type !== controls.sourceType.value) return false;
          if (controls.documentType.value && item.document_type !== controls.documentType.value) return false;
          if (controls.changeType.value && item.change_type !== controls.changeType.value) return false;
          if (controls.date.value && item.publish_date !== controls.date.value) return false;
          if (!query) return true;
          return [item.title, item.raw_text, item.ministry, item.issue_number, item.source]
            .filter(Boolean)
            .join(" ")
            .toLowerCase()
            .includes(query);
        });
      }

      function metaHtml(item) {
        const labels = [
          sourceTypeLabels[item.source_type],
          documentTypeLabels[item.document_type],
          changeTypeLabels[item.change_type],
          confidenceLabels[item.confidence],
          item.auto_summary ? "자동요약" : "",
          item.verification_required ? "검증 필요" : ""
        ].filter(Boolean);

        return labels
          .map((label) => `<span class="${label === "검증 필요" ? "warn" : ""}">${escapeHtml(label)}</span>`)
          .join("");
      }

      function renderList() {
        const filtered = filterItems();
        const itemList = document.getElementById("item-list");
        document.getElementById("result-count").textContent = `${filtered.length.toLocaleString("ko-KR")}건`;

        if (!filtered.length) {
          itemList.innerHTML =
            '<div class="empty-state"><strong>표시할 항목이 없습니다.</strong><span>현재 필터 조건에 맞는 수집 결과가 없습니다.</span></div>';
          return;
        }

        itemList.innerHTML = filtered
          .map(
            (item) => `
              <article class="item-card">
                <div class="item-main">
                  <div class="item-meta">${metaHtml(item)}</div>
                  <h2><button type="button" data-detail="${escapeHtml(item.id)}">${escapeHtml(item.title)}</button></h2>
                  <p>${escapeHtml(item.summary || "자동요약 전입니다. 원문 링크를 먼저 확인하세요.")}</p>
                  <div class="item-foot">
                    <span>${escapeHtml(item.ministry)}</span>
                    <span>${escapeHtml(item.issue_number || "문서번호 없음")}</span>
                    <span>공표 ${escapeHtml(item.publish_date || "-")}</span>
                    <span>시행 ${escapeHtml(item.effective_date || "-")}</span>
                  </div>
                </div>
                <div class="item-actions">
                  <a href="${escapeHtml(item.original_url)}" target="_blank" rel="noreferrer">원문</a>
                  <button type="button" data-detail="${escapeHtml(item.id)}">상세</button>
                </div>
              </article>
            `
          )
          .join("");

        itemList.querySelectorAll("[data-detail]").forEach((button) => {
          button.addEventListener("click", () => showDetail(button.getAttribute("data-detail")));
        });
      }

      function renderLogs() {
        document.getElementById("logs").innerHTML = run.logs
          .map(
            (log) => `
              <li>
                <span class="status-dot ${escapeHtml(log.status)}"></span>
                <div>
                  <strong>${escapeHtml(log.source)}</strong>
                  <p>${escapeHtml(log.message)}</p>
                </div>
                <span>${Number(log.count).toLocaleString("ko-KR")}건</span>
              </li>
            `
          )
          .join("");
      }

      function showDetail(id) {
        const item = sortedItems.find((entry) => entry.id === id);
        if (!item) return;

        document.getElementById("list-view").classList.add("hidden");
        const detailView = document.getElementById("detail-view");
        detailView.classList.remove("hidden");
        detailView.innerHTML = `
          <button class="back-link" type="button" id="back-to-list">미리보기 목록으로</button>
          <article class="detail-panel">
            <div class="item-meta">${metaHtml(item)}</div>
            <h1>${escapeHtml(item.title)}</h1>
            <dl class="detail-grid">
              <div><dt>기관</dt><dd>${escapeHtml(item.ministry)}</dd></div>
              <div><dt>문서번호</dt><dd>${escapeHtml(item.issue_number || "-")}</dd></div>
              <div><dt>공표일</dt><dd>${escapeHtml(item.publish_date || "-")}</dd></div>
              <div><dt>시행일</dt><dd>${escapeHtml(item.effective_date || "-")}</dd></div>
              <div><dt>출처</dt><dd>${escapeHtml(item.source)}</dd></div>
              <div><dt>원문</dt><dd><a href="${escapeHtml(item.original_url)}" target="_blank" rel="noreferrer">원문 열기</a></dd></div>
            </dl>
            <section class="detail-section">
              <h2>자동요약</h2>
              <p>${escapeHtml(item.summary || "자동요약: 아직 요약이 생성되지 않았습니다. 원문을 우선 확인하세요.")}</p>
              <p class="note">자동요약은 원문을 대체하지 않습니다.</p>
            </section>
            ${
              item.diff_summary
                ? `<section class="detail-section"><h2>변경 감지</h2><p>${escapeHtml(item.diff_summary)}</p></section>`
                : ""
            }
            ${
              item.attachment_urls.length
                ? `<section class="detail-section"><h2>첨부</h2><ul class="link-list">${item.attachment_urls
                    .map((url) => `<li><a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(url)}</a></li>`)
                    .join("")}</ul></section>`
                : ""
            }
            <section class="detail-section">
              <h2>원문 추출 텍스트</h2>
              <pre class="raw-text">${escapeHtml(item.raw_text || "원문 본문을 가져오지 못했습니다. 원문 링크를 확인하세요.")}</pre>
            </section>
          </article>
        `;
        document.getElementById("back-to-list").addEventListener("click", showList);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showList() {
        document.getElementById("detail-view").classList.add("hidden");
        document.getElementById("list-view").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function init() {
        fillSelect(controls.ministry, unique(sortedItems.map((item) => item.ministry)));
        fillSelect(controls.sourceType, Object.keys(sourceTypeLabels), sourceTypeLabels);
        fillSelect(controls.documentType, Object.keys(documentTypeLabels), documentTypeLabels);
        fillSelect(controls.changeType, Object.keys(changeTypeLabels), changeTypeLabels);
        fillSelect(controls.date, unique(sortedItems.map((item) => item.publish_date)).reverse());

        Object.values(controls).forEach((control) => control.addEventListener("input", renderList));
        Object.values(controls).forEach((control) => control.addEventListener("change", renderList));

        renderStats();
        renderLogs();
        renderList();
      }

      init();
    </script>
  </body>
</html>
