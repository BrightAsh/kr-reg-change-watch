name: Temporary backfill May 2026

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target_date:
          - 2026-05-18
          - 2026-05-19
          - 2026-05-20
          - 2026-05-21
          - 2026-05-22
          - 2026-05-23
          - 2026-05-24
          - 2026-05-25
          - 2026-05-26
          - 2026-05-27
          - 2026-05-28
    env:
      LAW_OPEN_API_OC: ${{ secrets.LAW_OPEN_API_OC }}
      LAW_OC: ${{ secrets.LAW_OC }}
      KOREAN_LAW_API_KEY: ${{ secrets.KOREAN_LAW_API_KEY }}
      LAWMAKING_OC: ${{ secrets.LAWMAKING_OC }}
      LAWMAKING_BASE: https://www.lawmaking.go.kr/rest
      GWANBO_LIST_URL: ${{ secrets.GWANBO_LIST_URL }}
      DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      FETCH_LOOKBACK_DAYS: 1
      FETCH_TIMEOUT_MS: 30000
      FETCH_RETRIES: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Reset local data
        run: |
          rm -rf data
          mkdir -p data/daily data/logs data/snapshots

      - name: Collect date
        run: npm run collect -- --date "${{ matrix.target_date }}" --force

      - uses: actions/upload-artifact@v4
        with:
          name: daily-${{ matrix.target_date }}
          path: data/daily/${{ matrix.target_date }}.json
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.target_date }}
          path: data/snapshots/${{ matrix.target_date }}.json
          if-no-files-found: warn

  merge:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge date artifacts
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const dates = [
            "2026-05-18",
            "2026-05-19",
            "2026-05-20",
            "2026-05-21",
            "2026-05-22",
            "2026-05-23",
            "2026-05-24",
            "2026-05-25",
            "2026-05-26",
            "2026-05-27",
            "2026-05-28"
          ];

          fs.rmSync("data", { recursive: true, force: true });
          fs.mkdirSync("data/daily", { recursive: true });
          fs.mkdirSync("data/snapshots", { recursive: true });
          fs.mkdirSync("data/logs", { recursive: true });

          const itemMap = new Map();
          const allLogs = [];
          let lastDaily = null;

          for (const date of dates) {
            const dailyPath = path.join("artifacts", `daily-${date}`, `${date}.json`);
            if (!fs.existsSync(dailyPath)) throw new Error(`Missing daily artifact for ${date}`);
            const daily = JSON.parse(fs.readFileSync(dailyPath, "utf8"));
            fs.copyFileSync(dailyPath, path.join("data", "daily", `${date}.json`));

            const snapshotPath = path.join("artifacts", `snapshot-${date}`, `${date}.json`);
            if (fs.existsSync(snapshotPath)) {
              fs.copyFileSync(snapshotPath, path.join("data", "snapshots", `${date}.json`));
            } else {
              fs.writeFileSync(path.join("data", "snapshots", `${date}.json`), JSON.stringify(daily.items || [], null, 2) + "\n");
            }

            for (const item of daily.items || []) itemMap.set(item.id, item);
            for (const log of daily.logs || []) allLogs.push({ ...log, date });
            lastDaily = daily;
          }

          const items = [...itemMap.values()].sort((a, b) => {
            const dateA = a.collection_date || a.publish_date || "";
            const dateB = b.collection_date || b.publish_date || "";
            if (dateA !== dateB) return dateB.localeCompare(dateA);
            return String(a.title || "").localeCompare(String(b.title || ""), "ko");
          });

          fs.writeFileSync("data/items.json", JSON.stringify(items, null, 2) + "\n");
          fs.writeFileSync("data/logs/last-fetch.json", JSON.stringify(allLogs, null, 2) + "\n");
          fs.writeFileSync(
            "data/run.json",
            JSON.stringify(
              {
                last_run_at: new Date().toISOString(),
                last_target_date: dates[dates.length - 1],
                item_count: items.length,
                changed_count: lastDaily?.item_count || 0,
                available_dates: [...dates].reverse(),
                cache_hit: false,
                logs: allLogs
              },
              null,
              2
            ) + "\n"
          );
          NODE

      - name: Commit backfilled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Backfill regulatory changes for May 18-28 2026"
            git push
          fi
